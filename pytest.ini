[pytest]
testpaths = robot_waiter_ai/tests
markers =
    unit: pure logic unit tests
    integration: HTTP-level integration tests (spins up a real ThreadingHTTPServer)

norecursedirs =
    .git
    .venv
    .pytest_cache
    robot_waiter_ai/.tmp_pytest
    robot_waiter_ai/.pytest_tmp
    robot_waiter_ai/.test_tmp_runtime
    probe_basetemp
    pytest_tmp_work
